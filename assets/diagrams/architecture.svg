<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">DiscoveryOS architecture</title>
  <desc id="desc">A layered architecture diagram showing researcher, Next.js interface, FastAPI backend, data services, OpenAI, and MCP tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071014"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <style>
      .label{font:700 24px Inter,Arial,sans-serif;fill:#f8fafc}
      .body{font:500 16px Inter,Arial,sans-serif;fill:#a7b4c2}
      .node{fill:#111c24;stroke:#2b3b47;stroke-width:1.5;filter:url(#shadow)}
      .small{fill:#0b141a;stroke:#263640;stroke-width:1.2}
      .line{stroke:url(#accent);stroke-width:4;stroke-linecap:round}
    </style>
  </defs>
  <rect width="1200" height="560" rx="28" fill="url(#bg)"/>
  <text x="60" y="72" class="label">DiscoveryOS Architecture</text>
  <text x="60" y="103" class="body">A product workspace that keeps research workflows auditable from prompt to report.</text>
  <rect x="70" y="180" width="180" height="110" rx="18" class="node"/>
  <text x="105" y="230" class="label">Researcher</text>
  <text x="105" y="258" class="body">Goals and review</text>
  <rect x="330" y="150" width="220" height="170" rx="20" class="node"/>
  <text x="370" y="214" class="label">Next.js UI</text>
  <text x="370" y="246" class="body">Static routes</text>
  <text x="370" y="274" class="body">Graph tools</text>
  <rect x="640" y="150" width="220" height="170" rx="20" class="node"/>
  <text x="683" y="214" class="label">FastAPI</text>
  <text x="683" y="246" class="body">Agents API</text>
  <text x="683" y="274" class="body">SSE pipeline</text>
  <rect x="950" y="92" width="180" height="90" rx="16" class="small"/>
  <text x="987" y="143" class="body">PostgreSQL</text>
  <rect x="950" y="215" width="180" height="90" rx="16" class="small"/>
  <text x="1015" y="266" class="body">Redis</text>
  <rect x="950" y="338" width="180" height="90" rx="16" class="small"/>
  <text x="1012" y="389" class="body">OpenAI</text>
  <rect x="640" y="390" width="220" height="80" rx="18" class="node"/>
  <text x="693" y="438" class="body">MCP tool boundary</text>
  <path d="M250 235H330" class="line"/>
  <path d="M550 235H640" class="line"/>
  <path d="M860 205L950 137" class="line"/>
  <path d="M860 235H950" class="line"/>
  <path d="M860 265L950 383" class="line"/>
  <path d="M750 320V390" class="line"/>
</svg>
