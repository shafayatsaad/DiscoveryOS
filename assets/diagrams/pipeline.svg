<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">DiscoveryOS research pipeline</title>
  <desc id="desc">A horizontal pipeline from research goal through planning, retrieval, evidence, graph, ML signals, experiments, and report.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0" stop-color="#081116"/>
      <stop offset="1" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" x2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset=".5" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <style>
      .title{font:800 28px Inter,Arial,sans-serif;fill:#f8fafc}
      .label{font:700 17px Inter,Arial,sans-serif;fill:#f8fafc}
      .body{font:500 13px Inter,Arial,sans-serif;fill:#9fb0c0}
      .card{fill:#101b24;stroke:#2a3d4b;stroke-width:1.4}
      .num{font:800 15px Inter,Arial,sans-serif;fill:#061014}
      .dot{fill:url(#stroke)}
      .line{stroke:url(#stroke);stroke-width:4;stroke-linecap:round}
    </style>
  </defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <text x="56" y="70" class="title">From Research Goal to Evidence-Backed Report</text>
  <path d="M134 210H1066" class="line"/>
  <g transform="translate(60 130)">
    <rect width="140" height="128" rx="18" class="card"/>
    <circle cx="28" cy="32" r="15" class="dot"/><text x="24" y="37" class="num">1</text>
    <text x="24" y="72" class="label">Goal</text><text x="24" y="98" class="body">Research intent</text>
  </g>
  <g transform="translate(212 130)">
    <rect width="140" height="128" rx="18" class="card"/>
    <circle cx="28" cy="32" r="15" class="dot"/><text x="24" y="37" class="num">2</text>
    <text x="24" y="72" class="label">Plan</text><text x="24" y="98" class="body">Agent workflow</text>
  </g>
  <g transform="translate(364 130)">
    <rect width="140" height="128" rx="18" class="card"/>
    <circle cx="28" cy="32" r="15" class="dot"/><text x="24" y="37" class="num">3</text>
    <text x="24" y="72" class="label">Retrieve</text><text x="24" y="98" class="body">Literature scan</text>
  </g>
  <g transform="translate(516 130)">
    <rect width="140" height="128" rx="18" class="card"/>
    <circle cx="28" cy="32" r="15" class="dot"/><text x="24" y="37" class="num">4</text>
    <text x="24" y="72" class="label">Evidence</text><text x="24" y="98" class="body">Claims and confidence</text>
  </g>
  <g transform="translate(668 130)">
    <rect width="140" height="128" rx="18" class="card"/>
    <circle cx="28" cy="32" r="15" class="dot"/><text x="24" y="37" class="num">5</text>
    <text x="24" y="72" class="label">Graph</text><text x="24" y="98" class="body">Linked mechanisms</text>
  </g>
  <g transform="translate(820 130)">
    <rect width="140" height="128" rx="18" class="card"/>
    <circle cx="28" cy="32" r="15" class="dot"/><text x="24" y="37" class="num">6</text>
    <text x="24" y="72" class="label">Signals</text><text x="24" y="98" class="body">Novelty and gaps</text>
  </g>
  <g transform="translate(972 130)">
    <rect width="140" height="128" rx="18" class="card"/>
    <circle cx="28" cy="32" r="15" class="dot"/><text x="24" y="37" class="num">7</text>
    <text x="24" y="72" class="label">Report</text><text x="24" y="98" class="body">Auditable output</text>
  </g>
</svg>
